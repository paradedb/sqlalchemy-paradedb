# workflows/ci.yml
#
# CI
# Run linting and test matrix across supported Python versions.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test,dev]

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check
        run: mypy paradedb

  matrix-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    services:
      paradedb:
        image: paradedb/paradedb:0.21.10-pg18
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      PARADEDB_TEST_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test,dev]

      - name: Install pg client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for ParadeDB
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB" && exit 0
            sleep 2
          done
          echo "ParadeDB did not become ready" >&2
          exit 1

      - name: Run unit tests
        run: python -m pytest tests/unit

      - name: Run integration tests
        run: python -m pytest -m integration

      - name: Run examples
        run: |
          python examples/quickstart.py
          python examples/autocomplete.py
          python examples/more_like_this.py
          python examples/faceted_search.py
          python examples/hybrid_rrf.py
          python examples/rag.py
