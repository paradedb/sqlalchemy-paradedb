name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies
        run: uv sync --extra test --extra dev

      - name: Ruff check
        run: uv run --extra dev ruff check .

      - name: Type check
        run: uv run --extra dev mypy paradedb

  matrix-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies
        run: uv sync --extra test --extra dev

    services:
      paradedb:
        image: paradedb/paradedb:0.21.10-pg18
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      - name: Install pg client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Wait for ParadeDB
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 2
          done
          echo "ParadeDB did not become ready" >&2
          exit 1

      - name: Run unit tests
        run: uv run --extra test pytest tests/unit

      - name: Run integration tests
        run: uv run --extra test pytest -m integration
      - name: Run examples
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
        run: |
          uv run --extra test python examples/quickstart.py
          uv run --extra test python examples/autocomplete.py
          uv run --extra test python examples/more_like_this.py
          uv run --extra test python examples/faceted_search.py
          uv run --extra test python examples/hybrid_rrf.py
          uv run --extra test python examples/rag.py
